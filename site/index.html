<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKYO EVENTS — 東京イベント</title>
<style>
  :root{
    --paper:#f5f5f2; --card:#ffffff; --ink:#15171c; --ink-2:#5b606b; --ink-3:#9aa0ac;
    --line:#e3e3de; --stamp:#c8102e; --tix:#0b7a3e;
    --f-liquid:#4c5fd5; --f-ogroup:#00a04b; --f-zepp:#0091d4;
    --f-billboard:#8f2d56; --f-pia:#e4007f; --f-other:#6b7280;
    --f-quattro:#d97706; --f-www:#7c3aed; --f-duo:#0d9488; --f-loft:#b91c1c;
    --f-indie:#84cc16; --f-jazz:#78350f; --f-hall:#546e7a; --f-arena:#5b21b6;
    --f-festival:#059669;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
    font-size:15px;line-height:1.5}
  a{color:inherit}
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
  :focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}

  header{border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:20}
  .h-inner{max-width:980px;margin:0 auto;padding:14px 20px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .wordmark{font-weight:800;font-size:19px;letter-spacing:-.02em;white-space:nowrap}
  .wordmark small{font-weight:500;color:var(--ink-3);font-size:12px;margin-left:8px;letter-spacing:.08em}
  .tagline{color:var(--ink-2);font-size:12.5px;flex:1;min-width:180px}
  .lang-toggle{display:inline-flex;border:1.5px solid var(--ink);border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;letter-spacing:.05em}
  .lang-toggle button{padding:4px 13px;color:var(--ink-2)}
  .lang-toggle button[aria-pressed="true"]{background:var(--ink);color:var(--card)}

  .filters{max-width:980px;margin:0 auto;padding:16px 20px 6px}
  .f-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .f-label{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;min-width:66px}
  .chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 13px;font-size:13px;font-weight:600;color:var(--ink-2);transition:border-color .12s,color .12s}
  .chip:hover{border-color:var(--ink-2)}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--card);border-color:var(--ink)}
  .v-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;font-size:12.5px}
  .v-dot{width:17px;height:17px;border-radius:50%;color:#fff;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .v-chip[aria-pressed="false"] .v-dot{filter:grayscale(1);opacity:.5}
  .search{border:1px solid var(--line);border-radius:999px;background:var(--card);padding:6px 14px;font-size:13.5px;min-width:210px;flex:1;max-width:320px;color:var(--ink)}
  .search::placeholder{color:var(--ink-3)}
  .count{font-size:12px;color:var(--ink-3);margin-left:auto;white-space:nowrap}

  main{max-width:980px;margin:0 auto;padding:8px 20px 30px}
  .day{display:grid;grid-template-columns:92px 1fr;gap:0 18px;margin-top:22px}
  .day-head{position:sticky;top:64px;align-self:start;text-align:right;padding-top:2px}
  .day-num{font-size:30px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
  .day-dow{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--ink-2);margin-top:3px}
  .day-dow.sat{color:var(--f-zepp)} .day-dow.sun{color:var(--stamp)}
  .day-rel{font-size:10.5px;color:var(--ink-3);margin-top:2px}
  .cards{display:flex;flex-direction:column;gap:10px;border-left:1px solid var(--line);padding-left:18px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);display:flex;overflow:hidden;position:relative;transition:transform .12s ease,box-shadow .12s ease}
  .card:hover{transform:translateY(-1px);box-shadow:0 3px 14px rgba(21,23,28,.08)}
  @media (prefers-reduced-motion:reduce){.card,.chip{transition:none}.card:hover{transform:none}}
  .stub{flex:none;width:74px;padding:12px 8px;border-right:2px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;position:relative}
  .card::before,.card::after{content:"";position:absolute;left:74px;width:12px;height:12px;border-radius:50%;background:var(--paper);border:1px solid var(--line);transform:translateX(-7px)}
  .card::before{top:-7px}.card::after{bottom:-7px}
  .stub .t-label{font-size:8.5px;font-weight:700;letter-spacing:.14em;color:var(--ink-3)}
  .stub .t-time{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .stub .t-none{font-size:11px;color:var(--ink-3);text-align:center}
  .body{padding:12px 15px;flex:1;min-width:0}
  .title{font-size:15.5px;font-weight:750;line-height:1.35;overflow-wrap:anywhere}
  .subtitle{font-size:12.5px;color:var(--ink-2);margin-top:2px;overflow-wrap:anywhere}
  .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:9px;font-size:12px}
  .venue-tag{display:inline-flex;align-items:center;gap:6px;font-weight:700}
  .venue-tag .v-dot{width:15px;height:15px;font-size:9px}
  .area{color:var(--ink-3)}
  .price{font-variant-numeric:tabular-nums;color:var(--ink-2);font-weight:600}
  .g-tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ink-2);border:1px solid var(--line);border-radius:4px;padding:1px 6px}
  .tickets{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .tickets .tix-label{font-size:9.5px;font-weight:800;letter-spacing:.12em;color:var(--tix)}
  .tickets a{font-size:11px;font-weight:700;border:1.5px solid var(--tix);border-radius:999px;padding:2px 10px;text-decoration:none;color:var(--tix);background:var(--card)}
  .tickets a:hover{background:var(--tix);color:#fff}
  .lineup{font-size:11.5px;color:var(--ink-3);margin-top:6px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .srclink{font-size:12px;font-weight:700;text-decoration:none;color:var(--ink);white-space:nowrap;margin-left:auto}
  .srclink:hover{text-decoration:underline}
  .stamp{position:absolute;right:12px;top:10px;transform:rotate(7deg);border:2px solid var(--stamp);color:var(--stamp);border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.12em;padding:2px 7px;opacity:.9;background:rgba(255,255,255,.7)}
  .card.past{opacity:.55}
  .multiday{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.06em;margin-top:3px}
  .alink{cursor:pointer;border-bottom:1px dotted transparent}
  .alink:hover{border-bottom-color:var(--ink-2)}
  .venue-tag.alink:hover,.lineup .alink:hover{color:var(--ink)}
  .day-head{cursor:pointer}
  .day.collapsed .cards{display:none}
  .day.collapsed .day-num{opacity:.45}
  .day-count{font-size:10px;color:var(--ink-3);margin-top:2px}
  .mini-btn{border:1px solid var(--line);background:var(--card);border-radius:6px;padding:3px 10px;font-size:11.5px;font-weight:700;color:var(--ink-2)}
  .mini-btn:hover{border-color:var(--ink-2);color:var(--ink)}
  .detail-head{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-top:18px}
  .detail-head h2{font-size:22px;font-weight:800;letter-spacing:-.02em;overflow-wrap:anywhere}
  .detail-sub{color:var(--ink-2);font-size:13px;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .back-btn{display:inline-block;margin-top:16px;font-size:13px;font-weight:700;color:var(--ink-2)}
  .back-btn:hover{color:var(--ink)}
  .empty,.loading,.loaderr{text-align:center;color:var(--ink-2);padding:60px 20px 40px;font-size:14px;line-height:1.8}
  .empty button{text-decoration:underline;font-weight:700}
  .loaderr code{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:1px 6px}

  footer{border-top:1px solid var(--line);margin-top:34px;background:var(--card)}
  .f-inner{max-width:980px;margin:0 auto;padding:16px 20px;font-size:11.5px;color:var(--ink-3);line-height:1.8}
  .src-ok{color:var(--f-ogroup);font-weight:700}
  .src-err{color:var(--stamp);font-weight:700}
  .src-wait{color:var(--ink-3);font-weight:600}

  @media (max-width:620px){
    .day{grid-template-columns:56px 1fr;gap:0 12px}
    .day-num{font-size:22px}
    .day-head{top:110px}
    .cards{padding-left:12px}
    .stub{width:62px}
    .card::before,.card::after{left:62px}
    .count{width:100%;margin-left:0}
  }
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <div class="wordmark">TOKYO EVENTS<small>東京イベント</small></div>
    <div class="tagline" data-i18n="tagline"></div>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button id="btn-ja" aria-pressed="true">日本語</button>
      <button id="btn-en" aria-pressed="false">EN</button>
    </div>
  </div>
</header>

<section class="filters" id="filters" hidden>
  <div class="f-row">
    <span class="f-label" data-i18n="l_when"></span>
    <button class="chip" data-when="today"></button>
    <button class="chip" data-when="week" aria-pressed="true"></button>
    <button class="chip" data-when="weekend"></button>
    <button class="chip" data-when="all"></button>
  </div>
  <div class="f-row" id="vclass-row"><span class="f-label" data-i18n="l_vclass"></span></div>
  <div class="f-row" id="genre-row"><span class="f-label" data-i18n="l_genre"></span></div>
  <div class="f-row" style="align-items:flex-start">
    <span class="f-label" style="padding-top:6px" data-i18n="l_venue"></span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1" id="venue-chips"></div>
  </div>
  <div class="f-row">
    <input class="search" id="search" type="search">
    <button class="mini-btn" id="expand-all"></button>
    <button class="mini-btn" id="collapse-all"></button>
    <span class="count" id="count"></span>
  </div>
</section>

<main id="list"><div class="loading" data-i18n="loading"></div></main>

<footer><div class="f-inner" id="src-strip"></div></footer>

<script>
/* ============================================================
   Data contract: ./public.json produced by `cli.py export`
   { generated_at, sources:[{source,started_at,found,error}],
     events:[Event.to_json()...] }
   ============================================================ */
const VENUE_META = {
  liquidroom:        {fam:"liquid",   letter:"L"},
  oeast:             {fam:"ogroup",   letter:"E"},
  owest:             {fam:"ogroup",   letter:"W"},
  ocrest:            {fam:"ogroup",   letter:"C"},
  onest:             {fam:"ogroup",   letter:"N"},
  zepp_divercity:    {fam:"zepp",     letter:"Z"},
  zepp_haneda:       {fam:"zepp",     letter:"Z"},
  zepp_shinjuku:     {fam:"zepp",     letter:"Z"},
  zepp_yokohama:     {fam:"zepp",     letter:"Z"},
  billboard_tokyo:   {fam:"billboard",letter:"B"},
  billboard_yokohama:{fam:"billboard",letter:"B"},
  toyosu_pit:        {fam:"pia",      letter:"P"},
  pia_arena_mm:      {fam:"pia",      letter:"M"},
  quattro_shibuya:   {fam:"quattro",  letter:"Q"},
  www:               {fam:"www",      letter:"W"},
  www_x:             {fam:"www",      letter:"X"},
  duo:               {fam:"duo",      letter:"D"},
  loft_shinjuku:     {fam:"loft",     letter:"L"},
  shelter:           {fam:"loft",     letter:"S"},
  loft_heaven:       {fam:"loft",     letter:"H"},
  /* live houses / clubs */
  unit_daikanyama:   {fam:"indie",    letter:"U"},
  club_citta:        {fam:"indie",    letter:"C"},
  eggman:            {fam:"indie",    letter:"E"},
  shibuya_dive:      {fam:"indie",    letter:"D"},
  reny_shinjuku:     {fam:"indie",    letter:"R"},
  que_shimokitazawa: {fam:"indie",    letter:"Q"},
  yokohama_bay_hall: {fam:"indie",    letter:"B"},
  fever_shindaita:   {fam:"indie",    letter:"F"},
  veats_shibuya:     {fam:"indie",    letter:"V"},
  club_seata:        {fam:"indie",    letter:"S"},
  stellar_ball:      {fam:"indie",    letter:"S"},
  /* jazz clubs */
  bluenote_tokyo:    {fam:"jazz",     letter:"B"},
  cotton_club:       {fam:"jazz",     letter:"C"},
  /* seated halls / theaters */
  ex_theater:        {fam:"hall",     letter:"X"},
  line_cube_shibuya: {fam:"hall",     letter:"L"},
  hulic_hall:        {fam:"hall",     letter:"H"},
  kanadevia_hall:    {fam:"hall",     letter:"K"},
  sgc_hall_ariake:   {fam:"hall",     letter:"S"},
  tokyo_intl_forum:  {fam:"hall",     letter:"F"},
  nhk_hall:          {fam:"hall",     letter:"N"},
  opera_city:        {fam:"hall",     letter:"O"},
  tachikawa_stage_garden:{fam:"hall", letter:"T"},
  orchard_hall:      {fam:"hall",     letter:"O"},
  /* arenas / domes / stadiums */
  yokohama_arena:    {fam:"arena",    letter:"Y"},
  tokyo_dome:        {fam:"arena",    letter:"D"},
  tokyo_garden_theater:{fam:"arena",  letter:"G"},
  ariake_arena:      {fam:"arena",    letter:"A"},
  toyota_arena_tokyo:{fam:"arena",    letter:"T"},
  k_arena_yokohama:  {fam:"arena",    letter:"K"},
  yoyogi_gym1:       {fam:"arena",    letter:"Y"},
  kokuritsu_stadium: {fam:"arena",    letter:"S"},
  makuhari_messe:    {fam:"arena",    letter:"M"},
  yokohama_buntai:   {fam:"arena",    letter:"B"},
  /* gap venues reached via promoter sources (venue_key identities) */
  budokan:           {fam:"arena",    letter:"B"},
  lala_arena_tokyo_bay:{fam:"arena",  letter:"L"},
  pleasure_pleasure: {fam:"hall",     letter:"P"},
  meguro_persimmon:  {fam:"hall",     letter:"M"},
  otemachi_mitsui_hall:{fam:"hall",   letter:"O"},
  im_a_show:         {fam:"hall",     letter:"I"},
  tokyo_fm_hall:     {fam:"hall",     letter:"F"},
  jcom_hall_hachioji:{fam:"hall",     letter:"J"},
  carats_kawasaki:   {fam:"hall",     letter:"K"},
  omiya_sonic_city:  {fam:"hall",     letter:"S"},
  ichikawa_bunkakaikan:{fam:"hall",   letter:"I"},
  blues_alley_japan: {fam:"jazz",     letter:"B"},
  yokohama_mint_hall:{fam:"indie",    letter:"M"},
  heavens_rock_saitama:{fam:"indie",  letter:"H"},
  chiba_anga:        {fam:"indie",    letter:"A"},

  grapefruit_moon:   {fam:"indie",    letter:"G"},
  nishikawaguchi_hearts:{fam:"indie", letter:"H"},
  shimokita_shangrila:{fam:"indie",   letter:"S"},
  shibuya_lovez:     {fam:"indie",    letter:"L"},
  kinema_club:       {fam:"indie",    letter:"K"},
  shinjuku_head_power:{fam:"indie",   letter:"H"},
  kanda_myojin_hall: {fam:"hall",     letter:"K"},
  yokosuka_arts_theatre:{fam:"hall",  letter:"Y"},

  kanda_square_hall: {fam:"hall",     letter:"K"},
  suntory_hall:      {fam:"hall",     letter:"S"},
  ebisu_garden_hall: {fam:"hall",     letter:"E"},
  kannai_hall:       {fam:"hall",     letter:"K"},
  kawaguchi_lilia:   {fam:"hall",     letter:"L"},
  saitama_kaikan:    {fam:"hall",     letter:"S"},
  mori_no_hall21:    {fam:"hall",     letter:"M"},
  todoroki_arena:    {fam:"arena",    letter:"T"},
  kashiwa_palooza:   {fam:"indie",    letter:"P"},
  supernova_kawasaki:{fam:"indie",    letter:"S"},
  unravel_tokyo:     {fam:"indie",    letter:"U"},
  kata_ebisu:        {fam:"indie",    letter:"K"},
  belluna_dome:      {fam:"arena",    letter:"B"},
  pacifico_yokohama: {fam:"hall",     letter:"P"},
  baysis_yokohama:   {fam:"indie",    letter:"B"},
  tokyo_taiikukan:   {fam:"arena",    letter:"T"},
  zozo_marine_stadium:{fam:"arena",   letter:"Z"},
  /* festivals — the festival is the venue identity */

  summer_sonic_tokyo:{fam:"festival", letter:"S"},
  rock_in_japan:     {fam:"festival", letter:"R"},
  countdown_japan:   {fam:"festival", letter:"C"},
  japan_jam:         {fam:"festival", letter:"J"},
  sweet_love_shower: {fam:"festival", letter:"S"},
  metrock_tokyo:     {fam:"festival", letter:"M"},
  viva_la_rock:      {fam:"festival", letter:"V"},
  synchronicity_fes: {fam:"festival", letter:"S"},
  greenroom_fes:     {fam:"festival", letter:"G"},
  ultra_japan:       {fam:"festival", letter:"U"},

/* promoter events carry venue_key (canonical venue id from the export
   merge); venue-scraped events keep their source id as identity */
const venueIdOf=ev=>ev.venue_key||ev.source;
const FAM_COLOR = {liquid:"var(--f-liquid)",ogroup:"var(--f-ogroup)",
  zepp:"var(--f-zepp)",billboard:"var(--f-billboard)",pia:"var(--f-pia)",
  quattro:"var(--f-quattro)",www:"var(--f-www)",duo:"var(--f-duo)",
  loft:"var(--f-loft)",indie:"var(--f-indie)",jazz:"var(--f-jazz)",
  hall:"var(--f-hall)",arena:"var(--f-arena)",festival:"var(--f-festival)",
  other:"var(--f-other)"};
/* venue class (会場タイプ): derived from the scraper family, with the two
   Pia venues split (a live house and an arena share that family). */
const VCLASS_KEYS=["livehouse","jazz","hall","arena","festival"];
const FAM_CLASS={liquid:"livehouse",ogroup:"livehouse",zepp:"livehouse",
  quattro:"livehouse",www:"livehouse",duo:"livehouse",loft:"livehouse",
  indie:"livehouse",billboard:"jazz",jazz:"jazz",hall:"hall",arena:"arena",
  festival:"festival"};
const VCLASS_OVERRIDE={toyosu_pit:"livehouse",pia_arena_mm:"arena"};
const vclassOf=id=>VCLASS_OVERRIDE[id]||
  FAM_CLASS[(VENUE_META[id]||{}).fam]||"livehouse";
const GENRE_KEYS = ["idol","j-rock","international","k-pop","jazz-soul",
                    "classical","hiphop-rnb","electronic","anime-seiyu"];

const I18N = {
  ja:{
    tagline:"都内ライブハウスからアリーナまで、ひとつに。",
    l_when:"日付",l_genre:"ジャンル",l_venue:"会場",l_vclass:"会場タイプ",
    vclasses:{all:"すべて",livehouse:"ライブハウス・クラブ",jazz:"ジャズクラブ",
      hall:"ホール・劇場",arena:"アリーナ・スタジアム",festival:"フェス"},
    today:"今日",week:"今週",weekend:"今週末",all:"すべて",
    genres:{all:"すべて",idol:"アイドル","j-rock":"ロック・バンド",
      international:"来日・海外","k-pop":"K-POP","jazz-soul":"ジャズ・ソウル",
      classical:"クラシック","hiphop-rnb":"ヒップホップ/R&B",
      electronic:"エレクトロニック","anime-seiyu":"アニメ・声優"},
    search:"アーティスト・公演名で検索",
    count:n=>`${n} 件`,
    open:"OPEN",start:"START",tbd:"詳細は公演ページへ",
    from:p=>`¥${p.toLocaleString()}〜`,free:"無料",
    details:"公演ページ →",sold:"SOLD OUT",ended:"終了",todayTag:"本日",
    tickets:"チケット",
    multi:(a,b)=>`${a}〜${b}`,
    dow:["日","月","火","水","木","金","土"],
    dayfmt:d=>`${d.getMonth()+1}月${d.getDate()}日`,
    loading:"読み込み中…",
    loaderr:"イベントデータ（<code>public.json</code>）を読み込めませんでした。<br>初回はGitHub Actionsの「Scrape and deploy」を実行してください。",
    empty:"条件に合う公演がありません。",clear:"フィルターをリセット",
    updated:d=>`データ更新: ${d}`,
    okList:"取得済み",errList:"エラー",waitList:"イベント0件",
    facts:"本サイトは事実情報（日時・会場・料金）のみを掲載し、詳細・写真・チケットは各公演ページへリンクします。",
    allVenues:"すべて",expandAll:"すべて開く",collapseAll:"すべて閉じる",
    moreVenues:n=>`+ 他 ${n} 会場`,fewerVenues:"− 会場を減らす",
    back:"← 一覧へ戻る",
    artistShows:n=>`今後の公演 ${n} 件`,venueShows:n=>`公演 ${n} 件`,
    playsAt:"出演会場",
  },
  en:{
    tagline:"Every live house to every arena. One schedule.",
    l_when:"When",l_genre:"Genre",l_venue:"Venue",l_vclass:"Venue type",
    vclasses:{all:"All",livehouse:"Live houses / clubs",jazz:"Jazz clubs",
      hall:"Halls / theaters",arena:"Arenas / stadiums",festival:"Festivals"},
    today:"Today",week:"This week",weekend:"Weekend",all:"All dates",
    genres:{all:"All",idol:"Idol","j-rock":"Rock / Band",
      international:"Int'l artists","k-pop":"K-pop","jazz-soul":"Jazz / Soul",
      classical:"Classical","hiphop-rnb":"Hip-hop / R&B",
      electronic:"Electronic","anime-seiyu":"Anime / Seiyū"},
    search:"Search artist or event",
    count:n=>`${n} event${n===1?"":"s"}`,
    open:"OPEN",start:"START",tbd:"See event page",
    from:p=>`From ¥${p.toLocaleString()}`,free:"Free",
    details:"Details →",sold:"SOLD OUT",ended:"Ended",todayTag:"Today",
    tickets:"TICKETS",
    multi:(a,b)=>`${a} – ${b}`,
    dow:["SUN","MON","TUE","WED","THU","FRI","SAT"],
    dayfmt:d=>`${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]} ${d.getDate()}`,
    loading:"Loading…",
    loaderr:"Couldn't load the event feed (<code>public.json</code>).<br>Run the “Scrape and deploy” GitHub Action to generate it.",
    empty:"No events match your filters.",clear:"Clear filters",
    updated:d=>`Data updated: ${d}`,
    okList:"captured",errList:"errors",waitList:"0 events",
    facts:"This site lists facts only (dates, venues, prices) and links to each event page for details, photos, and tickets.",
    allVenues:"All",expandAll:"Expand all",collapseAll:"Collapse all",
    moreVenues:n=>`+ ${n} more venues`,fewerVenues:"− Fewer venues",
    back:"← Back to list",
    artistShows:n=>`${n} upcoming show${n===1?"":"s"}`,
    venueShows:n=>`${n} show${n===1?"":"s"}`,
    playsAt:"Venues",
  }
};

/* ============================================================ state */
let DATA=null, VENUES={}, VENUE_COUNTS={}, lang="ja", when="week", genre="all", query="";
let vclass="all";
let venuesExpanded=false;
let activeVenues=new Set();
let collapsedDays=new Set();
/* route: null = main list; {artist:name} or {venue:sourceId} = detail page */
function parseRoute(){
  const h=decodeURIComponent(location.hash||"");
  let m=h.match(/^#\/artist\/(.+)$/); if(m) return {artist:m[1]};
  m=h.match(/^#\/venue\/(.+)$/);      if(m) return {venue:m[1]};
  return null;
}
const TODAY=new Date(new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Tokyo"})+"T00:00:00+09:00");

/* ============================================================ load */
async function load(){
  try{
    const r=await fetch("./public.json",{cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    DATA=await r.json();
  }catch(e){
    document.getElementById("list").innerHTML=
      `<div class="loaderr">${I18N[lang].loaderr}</div>`;
    return;
  }
  // Build the venue registry from events (name/area come from the data).
  for(const ev of DATA.events){
    const vid=venueIdOf(ev);
    if(!VENUES[vid]){
      const meta=VENUE_META[vid]||
        {fam:"other",letter:(ev.venue_name||"?")[0].toUpperCase()};
      VENUES[vid]={...meta,
        name:ev.venue_name||vid, area:ev.venue_area||""};
    }
    // upcoming-show count drives which chips the collapsed strip shows
    if(ev.start_date&&isMusic(ev)&&P(ev.end_date||ev.start_date)>=TODAY)
      VENUE_COUNTS[vid]=(VENUE_COUNTS[vid]||0)+1;
  }
  activeVenues=new Set(Object.keys(VENUES));
  document.getElementById("filters").hidden=false;
  render();
}

/* ============================================================ helpers */
const P=s=>new Date(s+"T00:00:00+09:00");
const sameDay=(a,b)=>a.getTime()===b.getTime();
function inWindow(ev){
  const s=P(ev.start_date), e=P(ev.end_date||ev.start_date);
  /* every window — including "all dates" — starts at today; the feed
     keeps a little history but the list is forward-looking */
  if(e<TODAY) return false;
  if(when==="all") return true;
  if(when==="today") return s<=TODAY&&TODAY<=e;
  if(when==="week"){const end=new Date(TODAY);end.setDate(end.getDate()+6);return s<=end&&e>=TODAY;}
  if(when==="weekend"){
    const sat=new Date(TODAY);sat.setDate(sat.getDate()+((6-sat.getDay()+7)%7));
    const sun=new Date(sat);sun.setDate(sat.getDate()+1);
    return s<=sun&&e>=sat;
  }
  return true;
}
/* music site (for now): arena/hall calendars also carry sports,
   ice shows, ceremonies — scrapers mark those category:"other".
   Festivals count as music. */
const isMusic=ev=>["music","music_festival"].includes(ev.category||"music");
function matches(ev){
  if(!ev.start_date) return false;
  if(!isMusic(ev)) return false;
  if(vclass!=="all"&&vclassOf(venueIdOf(ev))!==vclass) return false;
  if(!activeVenues.has(venueIdOf(ev))) return false;
  if(genre!=="all"&&!(ev.genres||[]).includes(genre)) return false;
  if(!inWindow(ev)) return false;
  if(query){
    const hay=[ev.title_ja,ev.title_en,ev.subtitle,
      (ev.lineup||[]).join(" ")].filter(Boolean).join(" ").toLowerCase();
    if(!hay.includes(query)) return false;
  }
  return true;
}
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
/* Narrowing to one venue/class from a short date window often lands on an
   empty list even though the venue has upcoming shows — silently widen the
   window to "all dates" when (and only when) that rescues the result. */
function widenWhenIfEmpty(){
  if(when==="all"||!DATA) return;
  if(DATA.events.some(matches)) return;
  const saved=when;
  when="all";
  if(!DATA.events.some(matches)) when=saved;   /* truly nothing — keep window */
}
const dot=(src)=>{const v=VENUES[src];
  return `<span class="v-dot" style="background:${FAM_COLOR[v.fam]}">${v.letter}</span>`;};
/* --- artist cross-linking (client-side, computed from the feed) --- */
const norm=s=>String(s||"").normalize("NFKC").toLowerCase().replace(/\s+/g," ").trim();
function evMatchesArtist(ev,name){
  /* the exported artists[] index already includes guarded title matching
     (longest-artist-wins) — a raw substring fallback here would re-open
     false links like TRUE -> DREAMS COME TRUE shows */
  const n=norm(name); if(!n) return false;
  if((ev.artists||[]).some(a=>norm(a)===n)) return true;   /* server index */
  return (ev.lineup||[]).some(a=>norm(a)===n);
}
/* Titles are often "A / B" multi-act bills — make each act clickable. */
function titleSegments(title){
  const parts=String(title).split(/\s\/\s|／/).map(s=>s.trim()).filter(Boolean);
  return (parts.length>1?parts:[title]).map(p=>
    `<span class="alink" data-artist="${esc(p)}">${esc(p)}</span>`
  ).join(` <span style="color:var(--ink-3)">/</span> `);
}
const artistHash=n=>`#/artist/${encodeURIComponent(n)}`;
const venueHash=id=>`#/venue/${encodeURIComponent(id)}`;

/* ============================================================ render */
function renderGenreChips(){
  const row=document.getElementById("genre-row");
  row.querySelectorAll(".chip").forEach(n=>n.remove());
  const L=I18N[lang];
  const present=new Set(DATA.events.flatMap(e=>e.genres||[]));
  for(const g of ["all",...GENRE_KEYS.filter(g=>present.has(g))]){
    const b=document.createElement("button");
    b.className="chip";b.textContent=L.genres[g]||g;
    b.setAttribute("aria-pressed",genre===g);
    b.onclick=()=>{genre=g;render();};
    row.appendChild(b);
  }
}
function renderVclassChips(){
  const row=document.getElementById("vclass-row");
  row.querySelectorAll(".chip").forEach(n=>n.remove());
  const L=I18N[lang];
  const present=new Set(Object.keys(VENUES).map(vclassOf));
  for(const c of ["all",...VCLASS_KEYS.filter(c=>present.has(c))]){
    const b=document.createElement("button");
    b.className="chip";b.textContent=L.vclasses[c]||c;
    b.setAttribute("aria-pressed",vclass===c);
    b.onclick=()=>{
      vclass=c;
      /* a class pick resets any single-venue selection so the list
         reflects the whole class, not a stale venue intersection */
      activeVenues=new Set(Object.keys(VENUES));
      if(c!=="all") widenWhenIfEmpty();
      render();
    };
    row.appendChild(b);
  }
}
function renderVenueChips(){
  const wrap=document.getElementById("venue-chips");wrap.innerHTML="";
  const L=I18N[lang];
  const byClassThenName=(a,b)=>{
    const ca=VCLASS_KEYS.indexOf(vclassOf(a)), cb=VCLASS_KEYS.indexOf(vclassOf(b));
    return ca!==cb?ca-cb:VENUES[a].name.localeCompare(VENUES[b].name,"ja");
  };
  /* With a class picked: that class's full strip (incl. festivals under
     フェス). At "all": festivals stay out of the strip, and only the
     busiest venues show until the "+N more" chip expands the rest. */
  let shown, hidden=0;
  if(vclass!=="all"){
    shown=Object.keys(VENUES).filter(id=>vclassOf(id)===vclass)
      .sort(byClassThenName);
  }else{
    const pool=Object.keys(VENUES).filter(id=>vclassOf(id)!=="festival");
    if(venuesExpanded){
      shown=pool.sort(byClassThenName);
    }else{
      shown=pool.slice()
        .sort((a,b)=>(VENUE_COUNTS[b]||0)-(VENUE_COUNTS[a]||0))
        .slice(0,15);
      /* a solo-selected venue must stay visible even outside the top 15 */
      if(activeVenues.size===1){
        const sel=[...activeVenues][0];
        if(!shown.includes(sel)&&pool.includes(sel)) shown.push(sel);
      }
      hidden=pool.length-shown.length;
      shown.sort(byClassThenName);
    }
  }
  const all=Object.keys(VENUES);
  const allActive=activeVenues.size===all.length;
  const allBtn=document.createElement("button");
  allBtn.className="chip";
  allBtn.textContent=L.allVenues;
  allBtn.setAttribute("aria-pressed",allActive);
  allBtn.onclick=()=>{activeVenues=new Set(all);render();};
  wrap.appendChild(allBtn);
  for(const id of shown){const v=VENUES[id];
    const b=document.createElement("button");
    b.className="chip v-chip";
    b.setAttribute("aria-pressed",activeVenues.has(id)&&!allActive);
    b.innerHTML=`${dot(id)}<span>${esc(v.name)}</span>`;
    b.onclick=(e)=>{
      if(e.ctrlKey||e.metaKey||e.shiftKey){
        /* power-user multi-select: toggle membership */
        activeVenues.has(id)?activeVenues.delete(id):activeVenues.add(id);
        if(activeVenues.size===0) activeVenues=new Set(all);
      }else if(activeVenues.size===1&&activeVenues.has(id)){
        activeVenues=new Set(all);          /* click solo again -> all */
      }else{
        activeVenues=new Set([id]);         /* click -> only this venue */
        widenWhenIfEmpty();
      }
      render();
    };
    wrap.appendChild(b);
  }
  if(vclass==="all"&&(hidden>0||venuesExpanded)){
    const t=document.createElement("button");
    t.className="chip";
    t.textContent=venuesExpanded?L.fewerVenues:L.moreVenues(hidden);
    t.onclick=()=>{venuesExpanded=!venuesExpanded;renderVenueChips();};
    wrap.appendChild(t);
  }
}
function ticketBadges(ev){
  const links=(ev.ticket_links||[]).filter(t=>t.url).slice(0,3);
  if(!links.length) return "";
  const label={eplus:"e+",pia:"ぴあ",lawson:"ローチケ",rakuten:"楽天",
    zaiko:"ZAIKO",livepocket:"LivePocket",tiget:"TIGET",ticketmaster:"TM"};
  return `<div class="tickets"><span class="tix-label">${I18N[lang].tickets}</span>`+
    links.map(t=>
      `<a href="${esc(t.url)}" target="_blank" rel="noopener">${label[t.provider]||t.provider}</a>`
    ).join("")+`</div>`;
}
function dayGroupsHtml(evs){
  const L=I18N[lang];
  const groups=new Map();
  for(const ev of evs){
    if(!groups.has(ev.start_date)) groups.set(ev.start_date,[]);
    groups.get(ev.start_date).push(ev);
  }
  let html="";
  for(const [d,dayEvents] of groups){
    const dd=P(d),dow=dd.getDay();
    const isPast=P(dayEvents[0].end_date||d)<TODAY;
    const collapsed=collapsedDays.has(d);
    const rel=sameDay(dd,TODAY)?`<div class="day-rel">${L.todayTag}</div>`
            :isPast?`<div class="day-rel">${L.ended}</div>`:"";
    html+=`<section class="day ${collapsed?"collapsed":""}" data-day="${d}">
    <div class="day-head" data-toggle-day="${d}" role="button" aria-expanded="${!collapsed}">
      <div class="day-num">${dd.getMonth()+1}.${dd.getDate()}</div>
      <div class="day-dow ${dow===6?"sat":dow===0?"sun":""}">${L.dow[dow]}${lang==="ja"?"曜日":""}</div>${rel}
      <div class="day-count">${L.count(dayEvents.length)}</div>
    </div><div class="cards">`;
    for(const ev of dayEvents){
      const V=VENUES[venueIdOf(ev)];
      const past=P(ev.end_date||ev.start_date)<TODAY;
      const times=ev.open_time||ev.start_time
        ?`${ev.open_time?`<div class="t-label">${L.open}</div><div class="t-time">${ev.open_time}</div>`:""}
          ${ev.start_time?`<div class="t-label">${L.start}</div><div class="t-time">${ev.start_time}</div>`:""}`
        :`<div class="t-none">${L.tbd}</div>`;
      const price=ev.is_free?`<span class="price">${L.free}</span>`
        :ev.price_min?`<span class="price">${L.from(ev.price_min)}</span>`:"";
      const gtags=(ev.genres||[]).map(g=>`<span class="g-tag">${L.genres[g]||g}</span>`).join("");
      const multi=ev.end_date&&ev.end_date!==ev.start_date
        ?`<div class="multiday">${L.multi(L.dayfmt(P(ev.start_date)),L.dayfmt(P(ev.end_date)))}</div>`:"";
      const title=lang==="en"?(ev.title_en||ev.title_ja):(ev.title_ja||ev.title_en);
      const lineupHtml=(ev.lineup||[]).map(a=>
        `<span class="alink" data-artist="${esc(a)}">${esc(a)}</span>`).join(" / ");
      html+=`<article class="card ${past?"past":""}">
        <div class="stub">${times}</div>
        <div class="body">
          <div class="title">${titleSegments(title||"")}</div>
          ${ev.subtitle?`<div class="subtitle">${esc(ev.subtitle)}</div>`:""}
          ${multi}
          <div class="meta">
            <span class="venue-tag alink" data-venue-link="${esc(venueIdOf(ev))}">${dot(venueIdOf(ev))}${esc(V.name)}</span>
            <span class="area">${esc(V.area)}</span>
            ${price}${gtags}
            <a class="srclink" href="${esc(ev.source_url)}" target="_blank" rel="noopener">${L.details}</a>
          </div>
          ${lineupHtml?`<div class="lineup">${lineupHtml}</div>`:""}
          ${ticketBadges(ev)}
        </div>
        ${ev.is_sold_out?`<div class="stamp">${L.sold}</div>`:""}
      </article>`;
    }
    html+=`</div></section>`;
  }
  return html;
}
function renderList(){
  const L=I18N[lang];
  const list=document.getElementById("list");
  const evs=DATA.events.filter(matches).sort((a,b)=>
    a.start_date.localeCompare(b.start_date)||
    (a.start_time||"99").localeCompare(b.start_time||"99"));
  document.getElementById("count").textContent=L.count(evs.length);

  if(!evs.length){
    list.innerHTML=`<div class="empty"><p>${L.empty}</p><p style="margin-top:8px"><button id="clear-btn">${L.clear}</button></p></div>`;
    document.getElementById("clear-btn").onclick=()=>{
      when="all";genre="all";query="";document.getElementById("search").value="";
      activeVenues=new Set(Object.keys(VENUES));render();
    };
    return;
  }
  list.innerHTML=dayGroupsHtml(evs);
}
function renderStrip(){
  const L=I18N[lang];
  const strip=document.getElementById("src-strip");
  if(!DATA){strip.textContent="";return;}
  const ok=[],err=[],wait=[];
  for(const s of DATA.sources||[]){
    if(s.error) err.push(s.source);
    else if(s.found>0) ok.push(s.source);
    else wait.push(s.source);
  }
  const parts=[L.updated(new Date(DATA.generated_at).toLocaleString(
    lang==="ja"?"ja-JP":"en-US",{timeZone:"Asia/Tokyo"}))];
  if(ok.length) parts.push(`${L.okList}: <span class="src-ok">${ok.map(s=>s+" ✓").join(" ")}</span>`);
  if(err.length) parts.push(`${L.errList}: <span class="src-err">${err.map(s=>s+" ✗").join(" ")}</span>`);
  if(wait.length) parts.push(`${L.waitList}: <span class="src-wait">${wait.map(s=>s+" ○").join(" ")}</span>`);
  parts.push(L.facts);
  strip.innerHTML=parts.join("<br>");
}
/* ============================================================ detail pages */
function renderArtistPage(name){
  const L=I18N[lang];
  const list=document.getElementById("list");
  const evs=DATA.events.filter(ev=>ev.start_date&&isMusic(ev)&&evMatchesArtist(ev,name))
    .sort((a,b)=>a.start_date.localeCompare(b.start_date));
  const upcoming=evs.filter(ev=>P(ev.end_date||ev.start_date)>=TODAY);
  const genres=[...new Set(evs.flatMap(e=>e.genres||[]))];
  const venues=[...new Set(evs.map(venueIdOf))];
  list.innerHTML=`<div class="detail-head">
      <h2>${esc(name)}</h2>
      <div class="detail-sub">
        ${genres.map(g=>`<span class="g-tag">${L.genres[g]||g}</span>`).join("")}
        <span>${L.artistShows(upcoming.length)}</span>
        <span>${L.playsAt}:</span>
        ${venues.map(id=>`<span class="venue-tag alink" data-venue-link="${esc(id)}" style="font-size:12px">${dot(id)}${esc(VENUES[id].name)}</span>`).join("")}
      </div>
      <a class="back-btn alink" data-back="1">${L.back}</a>
    </div>`+dayGroupsHtml(upcoming.length?upcoming:evs);
  document.getElementById("count").textContent=L.count(evs.length);
}
function renderVenuePage(id){
  const L=I18N[lang];
  const list=document.getElementById("list");
  const V=VENUES[id];
  if(!V){list.innerHTML=`<div class="empty">${L.empty}</div>`;return;}
  const evs=DATA.events.filter(ev=>venueIdOf(ev)===id&&ev.start_date&&isMusic(ev))
    .sort((a,b)=>a.start_date.localeCompare(b.start_date));
  const upcoming=evs.filter(ev=>P(ev.end_date||ev.start_date)>=TODAY);
  const sample=evs.find(e=>e.address);
  list.innerHTML=`<div class="detail-head">
      <h2>${dot(id)} ${esc(V.name)}</h2>
      <div class="detail-sub">
        <span>${esc(V.area)}</span>
        ${sample?`<span>${esc(sample.address)}</span>`:""}
        <span>${L.venueShows(upcoming.length)}</span>
      </div>
      <a class="back-btn alink" data-back="1">${L.back}</a>
    </div>`+dayGroupsHtml(upcoming);
  document.getElementById("count").textContent=L.count(upcoming.length);
}
function render(){
  const L=I18N[lang];
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(n=>{
    const v=L[n.dataset.i18n];
    if(typeof v==="string") n.innerHTML=v;
  });
  document.querySelectorAll("[data-when]").forEach(b=>{
    b.textContent=L[b.dataset.when];
    b.setAttribute("aria-pressed",b.dataset.when===when);
  });
  document.getElementById("search").placeholder=L.search;
  document.getElementById("expand-all").textContent=L.expandAll;
  document.getElementById("collapse-all").textContent=L.collapseAll;
  document.getElementById("btn-ja").setAttribute("aria-pressed",lang==="ja");
  document.getElementById("btn-en").setAttribute("aria-pressed",lang==="en");
  renderStrip();
  if(!DATA) return;
  const route=parseRoute();
  document.getElementById("filters").hidden=!!route;
  if(route&&route.artist){renderArtistPage(route.artist);return;}
  if(route&&route.venue){renderVenuePage(route.venue);return;}
  renderVclassChips();
  renderGenreChips();
  renderVenueChips();
  renderList();
}

document.getElementById("btn-ja").onclick=()=>{lang="ja";render();};
document.getElementById("btn-en").onclick=()=>{lang="en";render();};
document.querySelectorAll("[data-when]").forEach(b=>{
  b.onclick=()=>{when=b.dataset.when;render();};
});
document.getElementById("search").addEventListener("input",e=>{
  query=e.target.value.trim().toLowerCase();renderList();
});
document.getElementById("expand-all").onclick=()=>{collapsedDays.clear();render();};
document.getElementById("collapse-all").onclick=()=>{
  for(const ev of DATA?DATA.events.filter(matches):[]) collapsedDays.add(ev.start_date);
  render();
};
/* delegation: artist links, venue links, day collapse, back buttons */
document.getElementById("list").addEventListener("click",e=>{
  const back=e.target.closest("[data-back]");
  if(back){history.length>1?history.back():(location.hash="");return;}
  const a=e.target.closest("[data-artist]");
  if(a){location.hash=artistHash(a.dataset.artist);return;}
  const v=e.target.closest("[data-venue-link]");
  if(v){location.hash=venueHash(v.dataset.venueLink);return;}
  const d=e.target.closest("[data-toggle-day]");
  if(d){const day=d.dataset.toggleDay;
    collapsedDays.has(day)?collapsedDays.delete(day):collapsedDays.add(day);
    d.closest(".day").classList.toggle("collapsed");
    d.setAttribute("aria-expanded",!collapsedDays.has(day));
  }
});
window.addEventListener("hashchange",render);

render();
load();
</script>
</body>
</html>
